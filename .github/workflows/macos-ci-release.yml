name: macOS CI and Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT: onivim3.xcodeproj
  SCHEME: onivim3
  APP_NAME: onivim3

jobs:
  test:
    name: Build and test
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Neovim test dependency
        run: |
          if ! command -v nvim >/dev/null 2>&1; then
            brew install neovim
          fi

      - name: Show tool versions
        run: |
          xcodebuild -version
          nvim --version

      - name: Run macOS tests
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

  release:
    name: Package GitHub release
    needs: test
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: macos-26
    permissions:
      contents: write
    env:
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive release build
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+(\.[0-9]+){0,2}$ ]]; then
            echo "Release tags must be v<major>[.<minor>[.<patch>]], for example v1.0.0." >&2
            exit 1
          fi
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "build/$APP_NAME.xcarchive" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            CODE_SIGNING_ALLOWED=NO

      - name: Sign and notarize when Apple secrets are configured
        run: |
          set -euo pipefail

          APP_PATH="build/$APP_NAME.xcarchive/Products/Applications/$APP_NAME.app"
          CONFIGURED_SECRETS=0
          for value in "$MACOS_CERTIFICATE_BASE64" "$MACOS_CERTIFICATE_PASSWORD" "$APPLE_ID" "$APPLE_TEAM_ID" "$APPLE_APP_SPECIFIC_PASSWORD"; do
            if [[ -n "$value" ]]; then
              CONFIGURED_SECRETS=$((CONFIGURED_SECRETS + 1))
            fi
          done

          if [[ "$CONFIGURED_SECRETS" -ne 0 && "$CONFIGURED_SECRETS" -ne 5 ]]; then
            echo "Either configure all Apple release secrets or configure none. Required: MACOS_CERTIFICATE_BASE64, MACOS_CERTIFICATE_PASSWORD, APPLE_ID, APPLE_TEAM_ID, APPLE_APP_SPECIFIC_PASSWORD." >&2
            exit 1
          fi

          if [[ "$CONFIGURED_SECRETS" -eq 0 ]]; then
            codesign --force --deep --sign - "$APP_PATH"
            echo "SIGNING_STATE=unsigned" >> "$GITHUB_ENV"
            exit 0
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          NOTARY_ZIP="$RUNNER_TEMP/$APP_NAME-notary.zip"

          printf '%s' "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "No Developer ID Application identity found in MACOS_CERTIFICATE_BASE64." >&2
            exit 1
          fi

          codesign --force --deep --options runtime --timestamp --sign "$SIGNING_IDENTITY" "$APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" "$NOTARY_ZIP"
          xcrun notarytool submit "$NOTARY_ZIP" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          echo "SIGNING_STATE=signed-notarized" >> "$GITHUB_ENV"

      - name: Create release assets
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          APP_PATH="build/$APP_NAME.xcarchive/Products/Applications/$APP_NAME.app"
          ASSET_NAME="$APP_NAME-$VERSION-macos-universal-$SIGNING_STATE.zip"

          mkdir -p release
          ditto -c -k --keepParent "$APP_PATH" "release/$ASSET_NAME"
          shasum -a 256 "release/$ASSET_NAME" > "release/$ASSET_NAME.sha256"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/* \
            --title "$APP_NAME $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
